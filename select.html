<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>등록 완료</title>
  <style>
    body{
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      padding:24px; background:#f7f7fb; color:#111; line-height:1.5;
    }
    .card{
      max-width:520px; margin:0 auto; background:#fff; border-radius:16px; padding:20px;
      box-shadow:0 6px 20px rgba(0,0,0,.08);
    }
    h1{font-size:20px; margin:0 0 10px;}
    p{margin:10px 0; color:#333;}
    .muted{color:#666; font-size:13px;}
    .btns{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
    a.btn,button.btn{
      display:inline-block; padding:12px 14px; border-radius:12px; border:0;
      text-decoration:none; font-weight:800; cursor:pointer;
    }
    .primary{background:#2F6BFF; color:#fff;}
    .ghost{background:#EEF2FF; color:#1E3A8A;}
    code{background:#f1f1f5; padding:2px 6px; border-radius:8px;}
  </style>
</head>
<body>
  <div class="card">
    <h1>등록 완료! ✅</h1>
    <p>부스 즐겨찾기 목록에 추가되었습니다.</p>

    <p class="muted">
      앱으로 돌아가려면 아래 <b>앱으로 열기</b>를 누르세요.<br/>
      카탈로그(PDF)로 돌아가려면 <b>카탈로그로 돌아가기</b>를 눌러 이 화면을 닫아주세요.
    </p>

    <div class="btns">
      <a id="openApp" class="btn primary" href="#">앱으로 열기</a>
      <button id="closePage" class="btn ghost" type="button">카탈로그로 돌아가기</button>
    </div>

    <p class="muted" style="margin-top:14px;">
      <b>카탈로그로 돌아가기</b>가 안 되면 iOS에서는 좌상단 <b>‘완료’</b> 버튼을 눌러 닫아주세요.
    </p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const booths = params.get('booths') || '';
    const encoded = encodeURIComponent(booths);

    // ✅ iOS/공통: 커스텀 스킴 (슬래시 없는 형태가 제일 호환 좋음)
    const iosLink = 'homicatalog://select?booths=' + encoded;

    // ✅ Android: intent://가 브라우저/웹뷰에서 성공률이 더 높음
    const androidLink =
      'intent://select?booths=' + encoded +
      '#Intent;scheme=homicatalog;package=com.ilmangdong.homicatalog;end';

    const ua = navigator.userAgent || '';
    const isAndroid = /Android/i.test(ua);

    document.getElementById('openApp').href = isAndroid ? androidLink : iosLink;

    // ✅ "카탈로그로 돌아가기" = 현재 웹뷰/사파리 화면 닫기 시도
    // - 성공하면 원래 보던 PDF(뷰어)로 돌아감
    // - 안 되면 사용자에게 '완료' 안내
    document.getElementById('closePage').addEventListener('click', () => {
      try { window.close(); } catch (e) {}
      // 일부 환경에서 close가 막혀있으면 반응이 없을 수 있음 (그럴 때는 안내대로 '완료' 사용)
    });
  </script>
</body>
</html>
