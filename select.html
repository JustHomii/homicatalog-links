<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>등록 완료</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      padding:24px; line-height:1.5; background:#f7f7fb; color:#111;}
    .card{max-width:520px; margin:0 auto; background:#fff; border-radius:16px; padding:20px;
      box-shadow:0 6px 20px rgba(0,0,0,.08);}
    h1{font-size:20px; margin:0 0 10px;}
    p{margin:10px 0; color:#333;}
    .muted{color:#666; font-size:13px;}
    .btns{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
    a.btn{display:inline-block; padding:12px 14px; border-radius:12px; text-decoration:none; font-weight:700;}
    .primary{background:#2F6BFF; color:#fff;}
    .ghost{background:#EEF2FF; color:#1E3A8A;}
    code{background:#f1f1f5; padding:2px 6px; border-radius:8px;}
  </style>
</head>
<body>
  <div class="card">
    <h1>등록 완료! ✅</h1>
    <p>부스 즐겨찾기 목록에 추가되었습니다.</p>
    <p class="muted">
      앱으로 돌아가려면 아래 버튼을 누르거나, 이 화면을 닫고 <b>뒤로 가기</b>를 눌러주세요.
    </p>

    <div class="btns">
      <a id="openApp" class="btn primary" href="#">앱으로 돌아가기</a>
      <a class="btn ghost" href="https://links.homicatalog.com/">홈으로</a>
    </div>

    <p class="muted" style="margin-top:14px;">
      참고: iOS에서는 외부 문서(PDF)에서 링크를 열 때 Safari 화면이 잠깐 나타날 수 있어요.
    </p>
  </div>

  <script>
    // ✅ 쿼리에서 booths를 그대로 읽어서 커스텀 스킴으로 앱 열기 버튼을 만든다
    // 예: https://links.homicatalog.com/select?booths=VIR01~03
    const params = new URLSearchParams(location.search);
    const booths = params.get('booths') || '';
    const deeplink = 'homicatalog://select?booths=' + encodeURIComponent(booths);

    const btn = document.getElementById('openApp');
    btn.href = deeplink;
  </script>
</body>
</html>
